services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      FRED_API_KEY: 20efbecbe9334f236c4634f7852227d5
      MONGODB_URL: mongodb://mongo:27017/econpulse
      PORT: 3001
    depends_on:
      mongo:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - loki
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: wget --spider -q http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  loki-data:
  grafana-data:
