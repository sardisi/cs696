name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and test server
        working-directory: server
        env:
          MONGODB_URL: mongodb://localhost:27017/econpulse-test
          FRED_API_KEY: test
        run: |
          npm install
          npm test
